<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="email=no">
    <meta name="theme-color" content="#0f172a">
    <meta property="og:title" content="陆韦彬 和 高原的爱情故事">
    <meta property="og:description" content="甜蜜的时光在继续...">
    <title>我们的故事</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f35 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: #fff;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* 背景动画效果 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: float 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, -30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            max-height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 心形动画容器 */
        .heart-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .heart {
            font-size: 65px;
            animation: heartbeat 1.3s cubic-bezier(0.42, 0, 0.58, 1) infinite;
            filter: drop-shadow(0 0 20px rgba(236, 72, 153, 0.6));
            line-height: 1;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
        }

        .glow-ring {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(236, 72, 153, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 0.3;
            }
            50% { 
                transform: scale(1.2);
                opacity: 0.1;
            }
        }

        /* 照片容器 */
        .photo-container {
            margin-bottom: 25px;
            flex-shrink: 0;
            position: relative;
        }

        .couple-photo {
            width: clamp(160px, 55vw, 240px);
            height: clamp(160px, 55vw, 240px);
            object-fit: cover;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(236, 72, 153, 0.25);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.1), rgba(167, 139, 250, 0.1));
            mask-image: radial-gradient(circle at center, black 0%, black 80%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 0%, black 80%, transparent 100%);
            cursor: pointer;
        }

        .couple-photo:hover {
            transform: scale(1.05) translateY(-8px);
            box-shadow: 0 30px 80px rgba(236, 72, 153, 0.35);
        }

        /* 播放按钮覆盖层 */
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(236, 72, 153, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }

        .couple-photo:hover ~ .play-overlay,
        .play-overlay:hover {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-left: 18px solid white;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 4px;
        }

        /* 文字部分 */
        .title-group {
            margin-bottom: 28px;
            flex-shrink: 0;
        }

        .names {
            font-size: clamp(24px, 8vw, 42px);
            font-weight: 700;
            background: linear-gradient(135deg, #ec4899 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .subtitle-text {
            font-size: clamp(13px, 4vw, 15px);
            color: #a0aec0;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ec4899, transparent);
            margin: 14px auto;
            border-radius: 2px;
        }

        /* 计时器卡片 */
        .timer-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(236, 72, 153, 0.2);
            border-radius: 20px;
            padding: 22px 26px;
            margin: 20px 0;
            box-shadow: 0 8px 32px rgba(236, 72, 153, 0.1);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .timer-card:hover {
            border-color: rgba(236, 72, 153, 0.4);
            box-shadow: 0 12px 48px rgba(236, 72, 153, 0.15);
        }

        .timer-label {
            font-size: clamp(12px, 3vw, 13px);
            color: #cbd5e0;
            font-weight: 300;
            margin-bottom: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* 时间单位分开显示 */
        .time-units {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 0;
        }

        .time-unit {
            background: rgba(167, 139, 250, 0.05);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 14px;
            padding: 12px 8px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .time-unit:hover {
            background: rgba(167, 139, 250, 0.1);
            border-color: rgba(167, 139, 250, 0.4);
            transform: translateY(-2px);
        }

        .time-value {
            font-size: clamp(18px, 6vw, 28px);
            font-weight: 700;
            background: linear-gradient(135deg, #ec4899, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }

        .time-label {
            font-size: clamp(10px, 2.5vw, 11px);
            color: #94a3b8;
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* 起始日期 */
        .start-date {
            font-size: clamp(12px, 3vw, 13px);
            color: #94a3b8;
            margin-top: 18px;
            letter-spacing: 0.5px;
            font-weight: 300;
            flex-shrink: 0;
        }

        .date-highlight {
            color: #f472b6;
            font-weight: 500;
        }

        /* 视频播放器模态框 */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .video-modal.active {
            display: flex;
            opacity: 1;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-player {
            width: 100%;
            max-height: 80vh;
            border-radius: 16px;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1001;
            backdrop-filter: blur(10px);
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
                max-width: 100%;
            }

            .heart-container {
                margin-bottom: 16px;
            }

            .heart {
                font-size: 55px;
            }

            .couple-photo {
                width: 140px;
                height: 140px;
                border-radius: 22px;
            }

            .photo-container {
                margin-bottom: 18px;
            }

            .title-group {
                margin-bottom: 20px;
            }

            .names {
                margin-bottom: 8px;
            }

            .divider {
                width: 50px;
                margin: 10px auto;
            }

            .timer-card {
                margin: 16px 0;
                padding: 18px 20px;
                border-radius: 16px;
            }

            .timer-label {
                margin-bottom: 10px;
            }

            .time-units {
                gap: 8px;
            }

            .time-unit {
                padding: 10px 6px;
                border-radius: 12px;
            }

            .video-container {
                width: 95%;
                border-radius: 12px;
            }
        }

        @media (min-width: 768px) {
            .container {
                max-width: 600px;
                padding: 40px 30px;
            }

            .heart-container {
                margin-bottom: 25px;
            }

            .couple-photo {
                width: 280px;
                height: 280px;
            }

            .photo-container {
                margin-bottom: 30px;
            }

            .timer-card {
                padding: 26px 32px;
            }

            .time-units {
                gap: 12px;
            }
        }

        /* 防止选中 */
        .container {
            -webkit-user-select: none;
            user-select: none;
        }

        /* 微信适配 */
        @media (max-height: 700px) {
            .container {
                padding: 16px 12px;
            }

            .heart-container {
                margin-bottom: 12px;
            }

            .heart {
                font-size: 50px;
            }

            .couple-photo {
                width: 130px;
                height: 130px;
                border-radius: 20px;
            }

            .photo-container {
                margin-bottom: 14px;
            }

            .title-group {
                margin-bottom: 16px;
            }

            .names {
                font-size: 20px;
            }

            .timer-card {
                margin: 12px 0;
                padding: 14px 16px;
                border-radius: 14px;
            }

            .timer-label {
                margin-bottom: 8px;
            }

            .time-units {
                gap: 6px;
            }

            .time-unit {
                padding: 8px 4px;
            }

            .time-value {
                font-size: 16px;
            }

            .time-label {
                font-size: 9px;
            }

            .start-date {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 心形动画 -->
        <div class="heart-container">
            <div class="glow-ring"></div>
            <div class="heart">❤️</div>
        </div>

        <!-- 照片容器 -->
        <div class="photo-container">
            <img id="couplePhoto" 
                 alt="陆韦彬和高原的合影" 
                 class="couple-photo"
                 onerror="handleImageError()">
            <div class="play-overlay">
                <div class="play-icon"></div>
            </div>
        </div>

        <!-- 标题 -->
        <div class="title-group">
            <h1 class="names">陆韦彬 & 高原</h1>
            <div class="divider"></div>
            <p class="subtitle-text">我们的故事</p>
        </div>

        <!-- 计时器卡片 -->
        <div class="timer-card">
            <p class="timer-label">已经在一起</p>
            
            <!-- 分时间单位显示 -->
            <div class="time-units">
                <div class="time-unit">
                    <div class="time-value" id="days-value">0</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="hours-value">00</div>
                    <div class="time-label">小时</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="minutes-value">00</div>
                    <div class="time-label">分钟</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="seconds-value">00</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
        </div>

        <!-- 起始日期 -->
        <p class="start-date">
            始于 <span class="date-highlight">2025年10月5日 23:23</span>
        </p>
    </div>

    <!-- 视频播放模态框 -->
    <div id="videoModal" class="video-modal">
        <button class="close-btn" onclick="closeVideo()">✕</button>
        <div class="video-container">
            <video id="videoPlayer" class="video-player" controls>
                <source src="https://raw.githubusercontent.com/GAOYUAN200/our-story/main/6cadedd71ee8db5dbc0bcbb801844246_raw.mp4" type="video/mp4">
                <source src="https://ghproxy.com/https://raw.githubusercontent.com/GAOYUAN200/our-story/main/6cadedd71ee8db5dbc0bcbb801844246_raw.mp4" type="video/mp4">
                你的浏览器不支持视频播放。
            </video>
        </div>
    </div>

    <script>
        // 国内 CDN 镜像列表（支持中国访问）
        const imageUrls = [
            'https://ghproxy.com/https://raw.githubusercontent.com/GAOYUAN200/our-story/main/1ee8ea1eedae471666d7a9b6961ce1b7.jpg',
            'https://raw.fastgit.org/GAOYUAN200/our-story/main/1ee8ea1eedae471666d7a9b6961ce1b7.jpg',
            'https://raw.githubusercontent.com/GAOYUAN200/our-story/main/1ee8ea1eedae471666d7a9b6961ce1b7.jpg',
            'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240"%3E%3Crect fill="%23432d6e" width="240" height="240"/%3E%3Ccircle cx="120" cy="120" r="100" fill="%2370c000" opacity="0.1"/%3E%3C/svg%3E',
        ];

        let currentImageIndex = 0;

        function loadImage() {
            const img = document.getElementById('couplePhoto');
            if (currentImageIndex < imageUrls.length) {
                img.src = imageUrls[currentImageIndex];
            }
        }

        function handleImageError() {
            currentImageIndex++;
            if (currentImageIndex < imageUrls.length) {
                console.log('尝试下一个镜像源...');
                loadImage();
            }
        }

        // 防止缩放
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        // 图片点击事件 - 打开视频播放器
        document.getElementById('couplePhoto').addEventListener('click', function() {
            openVideo();
        });

        function openVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('videoPlayer');
            modal.classList.add('active');
            video.play();
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('videoPlayer');
            modal.classList.remove('active');
            video.pause();
            video.currentTime = 0;
        }

        // 点击模态框背景关闭视频
        document.getElementById('videoModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeVideo();
            }
        });

        // ESC 键关闭视频
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeVideo();
            }
        });

        // 起始时间（北京时间 2025年10月5日 23:23）
        const startDate = new Date(2025, 9, 5, 23, 23, 0).getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const difference = now - startDate;

            // 计算时间单位
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // 格式化函数
            const pad = num => String(num).padStart(2, '0');

            // 更新各个时间单位
            document.getElementById('days-value').textContent = days;
            document.getElementById('hours-value').textContent = pad(hours);
            document.getElementById('minutes-value').textContent = pad(minutes);
            document.getElementById('seconds-value').textContent = pad(seconds);
        }

        // 初始化
        loadImage();
        updateTimer();
        
        // 每秒更新
        setInterval(updateTimer, 1000);

        // 页面可见性优化
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                updateTimer();
            }
        });

        // 防止页面被缩放
        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
